# Example entity records — the FORMAT only.
# Copy this file to `entities.yaml` and add your own verified records.
# Your real `entities.yaml` is git-ignored: your curated knowledge is yours to keep.

entities:
  - canonical_id: race.example          # stable lowercase ID; never changes with translations
    entity_type: race                   # race | clan | job | weapon | equipment | npc
    names:                              # add a language only after you verify the name
      ja-JP: ""
      zh-CN: ""
      zh-TW: ""
      en-US: "Example Race"
    aliases: {}                         # extra spellings per locale, e.g. en-US: [Alt Name]
    visual_prompt: ""
    negative_prompt: []
    game_version: ""                    # patch this record was verified against
    source: ""
    reviewed_at: ""                     # YYYY-MM-DD
    notes: "Replace with your own verified entities."

  - canonical_id: equipment.example_set # gear/glamour set recognized from the VLM outfit text
    entity_type: equipment
    names:
      en-US: "Example Gear Set"
    aliases:                            # distinctive words likely to appear in the outfit text;
      en-US: [silver jacket, cargo pants]  # recognition fires when one of these is found
    visual_prompt: "sleek silver bomber jacket, white cargo pants"  # verified appearance tokens
    negative_prompt: [armor plates]
    reference_image: ""                 # path to a canonical glamour shot (for later image injection)
    notes: "When recognized, its visual_prompt backstops the look without the user prompting it."
